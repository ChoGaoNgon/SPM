<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đang bảo trì</title>

    <style>
        :root {
            --bg: #020617;
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e5e7eb;
            --sub: #9ca3af;
            --primary: #60a5fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: radial-gradient(circle at 20% 20%, #1e293b, #020617 60%);
            color: var(--text);
            height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
        }

        body::before {
            width: 600px;
            height: 600px;
            background: rgba(96, 165, 250, 0.25);
            top: -150px;
            left: -150px;
        }

        body::after {
            width: 500px;
            height: 500px;
            background: rgba(59, 130, 246, 0.2);
            bottom: -150px;
            right: -150px;
        }

        .wrapper {
            width: 100%;
            max-width: 920px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .card {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 30px;
            align-items: center;

            padding: 42px;
            border-radius: 24px;

            background: var(--card);
            backdrop-filter: blur(18px);
            border: 1px solid var(--border);

            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.8s ease;
        }

        .icon-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .loader {
            width: 70px;
            aspect-ratio: 1;
            display: grid;
            color: var(--primary);
            background: radial-gradient(farthest-side, currentColor calc(100% - 6px), #0000 calc(100% - 5px) 0);
            -webkit-mask: radial-gradient(farthest-side, #0000 calc(100% - 13px), #000 calc(100% - 12px));
            border-radius: 50%;
            animation: spin 2s infinite linear;
        }

        .loader::before,
        .loader::after {
            content: "";
            grid-area: 1/1;
            background:
                linear-gradient(currentColor 0 0) center,
                linear-gradient(currentColor 0 0) center;
            background-size:
                100% 10px,
                10px 100%;
            background-repeat: no-repeat;
        }

        .loader::after {
            transform: rotate(45deg);
        }

        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 10px;
        }

        .badge {
            width: fit-content;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.8rem;
            margin-bottom: 14px;

            background: rgba(96, 165, 250, 0.12);
            color: var(--primary);
        }

        h1 {
            font-size: 2.2rem;
            line-height: 1.3;
            margin-bottom: 12px;
        }

        p {
            color: var(--sub);
            line-height: 1.6;
            margin-bottom: 22px;
        }

        .countdown {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.4px;
        }

        footer {
            margin-top: 22px;
            font-size: 0.8rem;
            color: var(--sub);
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 700px) {
            .card {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 24px;
            }

            .content {
                align-items: center;
                padding-left: 0;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <div class="card">

            <!-- LEFT -->
            <div class="icon-wrap">
                <div class="loader"></div>
            </div>

            <!-- RIGHT -->
            <div class="content">
                <div class="badge">System Maintenance</div>

                <h1>Hệ thống đang được nâng cấp</h1>

                <p>
                    Chúng tôi đang cải thiện hiệu năng và trải nghiệm người dùng.<br />
                    Website sẽ sớm hoạt động trở lại.
                </p>

                <div class="countdown" id="countdown">
                    Đang kiểm tra trạng thái hệ thống...
                </div>

                <footer>
                    © 2026 H.Q. Dung Solutions — DM Team
                </footer>
            </div>

        </div>
    </div>

    <script>
        function checkServer() {
            fetch("/", { method: "GET", cache: "no-store" })
                .then(r => {
                    if (r.ok) location.reload();
                })
                .catch(() => { });
        }

        setInterval(checkServer, 5000);
    </script>

</body>

</html>
