<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông báo hệ thống</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:Arial, Helvetica, sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f8;padding:20px 0;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0"
                   style="background-color:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);">

                <!-- HEADER -->
                <tr>
                    <td style="background-color:#0d6efd;padding:20px;color:#ffffff;">
                        <h2 style="margin:0;font-size:20px;">Công ty Cổ phần HTMP Việt Nam</h2>
                        <p style="margin:4px 0 0;font-size:14px;">
                            Thông báo từ hệ thống quản lý
                        </p>
                    </td>
                </tr>

                <!-- CONTENT -->
                <tr>
                    <td style="padding:24px;color:#333333;">
                        <p style="font-size:14px;margin-top:0;">{{content}}</p>

                        <!-- INFO BOX -->
                        <table width="100%" cellpadding="0" cellspacing="0"
                               style="background-color:#f8f9fa;border-left:4px solid #0d6efd;padding:12px;margin:16px 0;">
                            <tr>
                                <td style="font-size:13px;color:#555;">
                                    <strong>Thời gian:</strong> {{time}}<br>
                                    <strong>Người tạo:</strong> {{createdBy}}
                                </td>
                            </tr>
                        </table>

                        <!-- BUTTON -->
                        <div style="text-align:center;margin:24px 0;">
                            <a href="{{detailUrl}}" target="_blank"
                               style="background-color:#0d6efd;color:#ffffff;
                                      padding:12px 20px;text-decoration:none;
                                      border-radius:4px;font-size:14px;display:inline-block;">
                                Xem chi tiết
                            </a>
                        </div>

                        <p style="font-size:13px;color:#666;">
                            Nếu bạn không thực hiện hành động này, vui lòng bỏ qua email.
                        </p>

                        <p style="font-size:14px;margin-bottom:0;">
                            Trân trọng,<br>
                            <strong>Hệ thống HTMP</strong>
                        </p>
                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td style="background-color:#f1f1f1;padding:12px;text-align:center;font-size:12px;color:#777;">
                        © Design by DM Team.
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>
</body>
</html>
